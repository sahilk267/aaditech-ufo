name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python-tests:
    name: Python (server + agent) tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      FLASK_ENV: "testing"
      SECRET_KEY: "ci-only-not-secret"
      AGENT_API_KEY: "ci-agent-key"
      RATELIMIT_STORAGE_URL: "memory://"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-cov

      - name: Run pytest
        run: |
          pytest -x --tb=short \
            tests/test_redis_fallback.py \
            tests/test_agent_transport.py \
            tests/test_agent_commands_client.py \
            tests/test_agent_command_endpoints.py \
            tests/test_cert_pin_and_key_rotate.py \
            tests/test_production_smoke.py

  frontend-typecheck:
    name: Frontend strict TypeScript build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Type-check (strict)
        run: npx tsc -b --force

  windows-installer:
    name: Build Windows agent + NSIS installer
    runs-on: windows-latest
    timeout-minutes: 30
    needs: python-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build agent .exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --name aaditech-agent agent/agent.py

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: powershell
        run: |
          $ver = if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $env:GITHUB_REF -replace 'refs/tags/v',''
          } else {
            "0.0.0+ci.$($env:GITHUB_RUN_NUMBER)"
          }
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DAGENT_VERSION=$ver" `
            "/DAGENT_EXE_PATH=$PWD\dist\aaditech-agent.exe" `
            agent\installer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aaditech-ufo-agent-installer
          path: agent/AaditechUfoAgentSetup-*.exe
          if-no-files-found: error
