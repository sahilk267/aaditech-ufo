name: Agent Release Build and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Agent version (example: 1.2.3)"
        required: true
  push:
    tags:
      - "agent-v*"

permissions:
  contents: write

jobs:
  build-windows-agent:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#agent-v}"
          fi

          if [[ -z "$version" ]]; then
            echo "Version is required"
            exit 1
          fi

          if [[ ! "$version" =~ ^[A-Za-z0-9._-]{1,64}$ ]]; then
            echo "Invalid version format: $version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build versioned Windows agent
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_agent_windows.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: aaditech-agent-${{ steps.version.outputs.version }}
          path: agent/dist/aaditech-agent-${{ steps.version.outputs.version }}.exe

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ steps.version.outputs.version }}
          name: Agent v${{ steps.version.outputs.version }}
          files: agent/dist/aaditech-agent-${{ steps.version.outputs.version }}.exe
          generate_release_notes: true

      - name: Auto-publish to server release API (optional)
        if: ${{ secrets.AGENT_RELEASE_UPLOAD_URL != '' && secrets.AGENT_RELEASE_API_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            -X POST "${{ secrets.AGENT_RELEASE_UPLOAD_URL }}" \
            -H "X-API-Key: ${{ secrets.AGENT_RELEASE_API_KEY }}" \
            -H "X-Tenant-Slug: ${AGENT_RELEASE_TENANT_SLUG:-default}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "release_file=@agent/dist/aaditech-agent-${{ steps.version.outputs.version }}.exe"
