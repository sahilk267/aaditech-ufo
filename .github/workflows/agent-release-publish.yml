name: Agent Release Build and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Agent version (example: 1.2.3)"
        required: true
  push:
    tags:
      - "agent-v*"

permissions:
  contents: write

jobs:
  build-windows-agent:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#agent-v}"
          fi

          if [[ -z "$version" ]]; then
            echo "Version is required"
            exit 1
          fi

          if [[ ! "$version" =~ ^[A-Za-z0-9._-]{1,64}$ ]]; then
            echo "Invalid version format: $version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build versioned Windows agent
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_agent_windows.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: aaditech-agent-${{ steps.version.outputs.version }}
          path: agent/dist/aaditech-agent-${{ steps.version.outputs.version }}.exe

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ steps.version.outputs.version }}
          name: Agent v${{ steps.version.outputs.version }}
          files: agent/dist/aaditech-agent-${{ steps.version.outputs.version }}.exe
          generate_release_notes: true

      - name: Auto-publish to server release API (optional)
        if: ${{ secrets.AGENT_RELEASE_UPLOAD_URL != '' && secrets.AGENT_RELEASE_API_KEY != '' }}
        shell: bash
        env:
          UPLOAD_URL: ${{ secrets.AGENT_RELEASE_UPLOAD_URL }}
          UPLOAD_API_KEY: ${{ secrets.AGENT_RELEASE_API_KEY }}
          UPLOAD_TENANT_SLUG: ${{ secrets.AGENT_RELEASE_TENANT_SLUG }}
          UPLOAD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          tenant_slug="${UPLOAD_TENANT_SLUG:-default}"
          artifact="agent/dist/aaditech-agent-${UPLOAD_VERSION}.exe"
          if [[ ! -f "$artifact" ]]; then
            echo "::error::Built artifact not found at $artifact"
            exit 1
          fi
          echo "Uploading $artifact to $UPLOAD_URL (tenant=$tenant_slug)"
          curl --fail --show-error --silent \
            -X POST "$UPLOAD_URL" \
            -H "X-API-Key: $UPLOAD_API_KEY" \
            -H "X-Tenant-Slug: $tenant_slug" \
            -F "version=${UPLOAD_VERSION}" \
            -F "release_file=@${artifact}"
          echo "Upload completed."

      - name: Job summary
        if: always()
        shell: bash
        env:
          UPLOAD_URL: ${{ secrets.AGENT_RELEASE_UPLOAD_URL }}
          UPLOAD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo "## Agent Release v${UPLOAD_VERSION}"
            echo ""
            echo "- **Artifact:** \`aaditech-agent-${UPLOAD_VERSION}.exe\`"
            echo "- **CI artifact:** uploaded"
            echo "- **GitHub Release:** \`agent-v${UPLOAD_VERSION}\`"
            if [[ -n "${UPLOAD_URL:-}" ]]; then
              echo "- **Server upload:** attempted to \`${UPLOAD_URL}\`"
            else
              echo "- **Server upload:** skipped (set \`AGENT_RELEASE_UPLOAD_URL\` and \`AGENT_RELEASE_API_KEY\` secrets to enable)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

