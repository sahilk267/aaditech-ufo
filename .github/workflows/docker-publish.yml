name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Also push latest tag"
        required: false
        default: "true"
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_NAME: aaditech-ufo

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image tag
        id: version
        run: |
          tag="$(./scripts/docker_image_version.sh)"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Resolved image tag: ${tag}"

      - name: Docker metadata
        id: meta
        run: |
          image="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.version.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

      - name: Push latest tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_latest == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        run: |
          image="${{ steps.meta.outputs.image }}"
          docker pull "${image}:${{ steps.version.outputs.tag }}"
          docker tag "${image}:${{ steps.version.outputs.tag }}" "${image}:latest"
          docker push "${image}:latest"
