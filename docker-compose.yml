# Main docker-compose file with shared services configuration
# Use docker-compose -f docker-compose.yml -f docker-compose.dev.yml for development
# Or docker-compose -f docker-compose.yml -f docker-compose.prod.yml for production

x-app-environment: &app-environment
  DATABASE_URL: postgresql://${DB_USER:-aaditech}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-aaditech_ufo}
  REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
  FLASK_DEBUG: ${FLASK_DEBUG:-False}
  FLASK_ENV: ${FLASK_ENV:-production}
  ENABLE_PROXY_FIX: "True"
  PROXY_FIX_X_FOR: "1"
  PROXY_FIX_X_PROTO: "1"
  PROXY_FIX_X_HOST: "1"
  PROXY_FIX_X_PORT: "1"
  PROXY_FIX_X_PREFIX: "1"

x-app-labels: &app-labels
  com.example.description: "AADITECH UFO - SPA Application"
  com.example.version: "${APP_VERSION:-1.0.0}"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: aaditech-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-aaditech}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-aaditech_ufo}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init.sh
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aaditech} -d ${DB_NAME:-aaditech_ufo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aaditech-network
    labels: *app-labels

  # Redis Cache/Session Store
  redis:
    image: redis:7-alpine
    container_name: aaditech-redis
    command:
      - redis-server
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "${REDIS_PASSWORD:-redis123}"
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aaditech-network
    labels: *app-labels

  # Flask Backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.12"
    container_name: aaditech-app
    labels:
      <<: *app-labels
      com.example.component: "backend"
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aaditech-network
    profiles:
      - minimal
      - standard
      - full

  # Nginx Reverse Proxy / Gateway
  gateway:
    image: nginx:1.27-alpine
    container_name: aaditech-gateway
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/gateway/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aaditech-network
    labels:
      <<: *app-labels
      com.example.component: "gateway"
    profiles:
      - minimal
      - standard
      - full

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  aaditech-network:
    driver: bridge
