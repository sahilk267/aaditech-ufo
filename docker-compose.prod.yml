# Production overrides - use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  postgres:
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        redis-server --appendonly yes --requirepass "$REDIS_PASSWORD" --maxmemory 512mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.12"
    env_file:
      - .env.prod
    environment:
      - FLASK_DEBUG
      - FLASK_ENV
      - DATABASE_URL
      - REDIS_URL
      - SECRET_KEY
      - JWT_SECRET_KEY
      - ENABLE_PROXY_FIX
      - PROXY_FIX_X_FOR
      - PROXY_FIX_X_PROTO
      - PROXY_FIX_X_HOST
      - PROXY_FIX_X_PORT
      - PROXY_FIX_X_PREFIX
    expose:
      - "5000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NODE_ENV: "production"
    container_name: aaditech-frontend
    environment:
      VITE_API_BASE_URL: /api
      NODE_ENV: production
    expose:
      - "3000"
    restart: always
    networks:
      - aaditech-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  aaditech-network:
