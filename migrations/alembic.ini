# Alembic Configuration
# path to migration files
[alembic]
sqlalchemy.url = driver://user:pass@localhost/dbname

# use relative paths, so migrations work regardless of current working dir
prepend_sys_path = .

# max length of characters to apply to the
# "slug" field in migration message
# set to empty string to disable, but migrations created
# after this change will not verify against unicode characters.
mako.input_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

