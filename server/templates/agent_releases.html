{% extends "base.html" %}

{% block title %}Agent Releases{% endblock %}

{% block content %}
<div class="card">
  <h2>Agent Releases</h2>
  {% if releases %}
    <ul>
      {% for r in releases %}
        <li>{{ r.filename }}</li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No releases found.</p>
  {% endif %}
</div>
{% endblock %}
