services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-local}/${IMAGE_NAMESPACE:-aaditech}/${IMAGE_NAME:-ufo-app}:${IMAGE_TAG:-dev}
    working_dir: /app
    command: flask --app server.app run --host 0.0.0.0 --port 5000
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "False"
      ENABLE_PROXY_FIX: "True"
      PROXY_FIX_X_FOR: "1"
      PROXY_FIX_X_PROTO: "1"
      PROXY_FIX_X_HOST: "1"
      PROXY_FIX_X_PORT: "1"
      PROXY_FIX_X_PREFIX: "1"
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/gateway/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
