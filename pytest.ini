[pytest]
# Pytest configuration for AADITECH UFO

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories
testpaths = tests

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    auth: Authentication tests
    validation: Input validation tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Ignore patterns
norecursedirs = 
    .git
    .venv
    __pycache__
    *.egg-info
    instance
