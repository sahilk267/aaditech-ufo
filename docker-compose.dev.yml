# Development overrides - use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8 -c log_statement=all"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init.sh
      - ./scripts/seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql

  redis:
    ports:
      - "6379:6379"

  # Frontend Development Server (Vite with hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NODE_ENV: development
    container_name: aaditech-frontend-dev
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - aaditech-network
    profiles:
      - full

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.12"
    environment:
      FLASK_DEBUG: "True"
      FLASK_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-aaditech}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-aaditech_ufo}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      ENABLE_PROXY_FIX: "True"
      PROXY_FIX_X_FOR: "1"
      PROXY_FIX_X_PROTO: "1"
      PROXY_FIX_X_HOST: "1"
      PROXY_FIX_X_PORT: "1"
      PROXY_FIX_X_PREFIX: "1"
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app/server
      - ./migrations:/app/migrations
      - ./requirements.txt:/app/requirements.txt
      - ./entrypoint.sh:/app/entrypoint.sh
    command: bash -c "pip install -e . && flask --app server.app run --host 0.0.0.0 --port 5000"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - NGINX_PORT=8080
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/gateway/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - aaditech-network

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  aaditech-network:
